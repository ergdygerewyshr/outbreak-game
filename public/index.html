<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OUTBREAK — Survive the Horde</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0d0a;
  --panel:#12160f;
  --panel-border:#23291e;
  --acid:#9fef00;
  --blood:#d1302f;
  --bone:#e8e6df;
  --muted:#6b7364;

  --glow: 0 0 18px rgba(159,239,0,0.25);
  --soft-glow: 0 0 30px rgba(159,239,0,0.15);
}

*{
  box-sizing:border-box;
  transition: all 0.15s ease;
}

html,body{
  margin:0;
  padding:0;
  height:100%;
  background:var(--bg);
  color:var(--bone);
  font-family:'JetBrains Mono',monospace;
  overflow:hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

.display{
  font-family:'Oswald',sans-serif;
  text-transform:uppercase;
  letter-spacing:0.04em;
}

/* ---------- LOBBY ---------- */

#lobby{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;

  background:
    radial-gradient(circle at 50% 15%, rgba(159,239,0,0.12), transparent 55%),
    radial-gradient(circle at 20% 80%, rgba(209,48,47,0.08), transparent 60%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 4px),
    var(--bg);
}

.lobby-card{
  width:min(460px,92vw);
  background:linear-gradient(145deg, rgba(18,22,15,0.92), rgba(10,13,10,0.85));
  border:1px solid rgba(35,41,30,0.8);
  padding:38px 34px 28px;
  position:relative;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.65),
    inset 0 1px 0 rgba(255,255,255,0.04);

  backdrop-filter: blur(10px);
}

.lobby-card::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,var(--blood),var(--acid));
}

.eyebrow{
  color:var(--blood);
  font-size:12px;
  letter-spacing:0.25em;
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:6px;
}

.eyebrow::before{
  content:"";
  width:6px;
  height:6px;
  background:var(--blood);
  animation:pulse 1.4s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:0.25;}
}

h1.title{
  font-size:52px;
  margin:0 0 6px;
  line-height:0.9;
  letter-spacing:0.06em;
  text-shadow:
    0 0 20px rgba(159,239,0,0.35),
    0 0 60px rgba(159,239,0,0.12);
}

h1.title span{
  color:var(--acid);
  text-shadow:0 0 25px rgba(159,239,0,0.55);
}

.sub{
  color:var(--muted);
  font-size:13px;
  margin-bottom:20px;
  line-height:1.5;
}

.field-label{
  font-size:10px;
  letter-spacing:0.12em;
  color:var(--muted);
  margin-bottom:5px;
  text-transform:uppercase;
}

/* INPUTS */

input#nameInput,
input#roomInput{
  width:100%;
  background:rgba(5,7,4,0.9);
  border:1px solid rgba(35,41,30,0.9);
  color:var(--bone);
  font-size:15px;
  padding:12px 14px;
  outline:none;
  margin-bottom:14px;
}

input:focus{
  border-color:var(--acid);
  box-shadow:0 0 0 2px rgba(159,239,0,0.12),0 0 20px rgba(159,239,0,0.15);
}

/* BUTTON */

button#joinBtn{
  width:100%;
  padding:14px;
  border:none;
  cursor:pointer;

  background:linear-gradient(90deg,#9fef00,#7bdc00);
  color:#0a0d0a;

  font-family:'Oswald',sans-serif;
  font-weight:700;
  letter-spacing:0.1em;
  font-size:15px;
  text-transform:uppercase;

  box-shadow:
    0 10px 25px rgba(159,239,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.25);
}

button#joinBtn:hover{
  transform:translateY(-2px) scale(1.01);
  box-shadow:0 15px 35px rgba(159,239,0,0.22);
}

button#joinBtn:active{
  transform:scale(0.98);
}

/* ---------- GAME ---------- */

#gameWrap{
  display:none;
  position:fixed;
  inset:0;
  align-items:center;
  justify-content:center;
}

#canvasFrame{
  position:relative;
  width:min(96vw,1600px);
  aspect-ratio:16/9;
}

canvas{
  width:100%;
  height:100%;
  background:#0d120c;
  border:1px solid var(--panel-border);
}

/* HUD */

#hud{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.stat-block{
  background:rgba(10,13,10,0.65);
  border:1px solid rgba(35,41,30,0.6);
  padding:10px 14px;
  backdrop-filter:blur(8px);
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

/* HEALTH */

#healthBar .fill{
  height:100%;
  background:linear-gradient(90deg,#d1302f,#ff5a3c,#9fef00);
  box-shadow:0 0 12px rgba(209,48,47,0.35);
}

/* KILL FEED */

.feed-item{
  background:rgba(10,13,10,0.6);
  border-left:3px solid var(--acid);
  padding:6px 10px;
  font-size:11px;
  backdrop-filter:blur(6px);
}

.feed-item.down{
  border-left-color:var(--blood);
}

/* CENTER MESSAGE */

.center-msg .big{
  font-size:46px;
  color:var(--acid);
  text-shadow:0 0 24px rgba(159,239,0,0.4);
}

.center-msg .big.danger{
  color:var(--blood);
}

/* CHAT */

#chatLog{
  background:rgba(10,13,10,0.72);
  border:1px solid var(--panel-border);
  font-size:11px;
  padding:6px;
}

/* REST KEPT SIMPLE (unchanged layout-safe) */

#downedOverlay{
  position:absolute;
  inset:0;
  background:rgba(90,10,10,0.28);
  display:none;
  align-items:center;
  justify-content:center;
  font-family:'Oswald',sans-serif;
  color:var(--blood);
}

</style>
</head>

<body>

<div id="lobby">
  <div class="lobby-card">
    <div class="eyebrow">Signal lost — outskirts sector</div>
    <h1 class="title">OUT<span>BREAK</span></h1>
    <div class="sub">Online co-op wave survival. Team up, hold the line.</div>

    <div class="field-label">Callsign</div>
    <input id="nameInput" maxlength="14" placeholder="Your name" />

    <div class="field-label">Room code</div>
    <input id="roomInput" maxlength="8" placeholder="Optional" />

    <button id="joinBtn">Drop In</button>
    <div id="connStatus"></div>
  </div>
</div>

<div id="gameWrap">
  <div id="canvasFrame">
    <canvas id="game" width="1600" height="900"></canvas>

    <div id="hud">
      <div id="killFeed"></div>
      <div id="downedOverlay">DOWNED</div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/client.js"></script>

</body>
</html>
