<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OUTBREAK — Survive the Horde</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0d0a;
  --panel:#12160f;
  --panel-border:#23291e;
  --acid:#9fef00;
  --blood:#d1302f;
  --bone:#e8e6df;
  --muted:#6b7364;
}

/* ---------- GLOBAL ---------- */

*{
  box-sizing:border-box;
}

html, body{
  margin:0;
  padding:0;
  height:100%;
  background:var(--bg);
  color:var(--bone);
  font-family:'JetBrains Mono', monospace;
  overflow:hidden;

  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ---------- LOBBY BACKGROUND ---------- */

#lobby{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;

  background:
    radial-gradient(circle at 50% 20%, rgba(159,239,0,0.08), transparent 60%),
    radial-gradient(circle at 20% 80%, rgba(209,48,47,0.05), transparent 60%),
    var(--bg);
}

/* ---------- LOBBY CARD ---------- */

.lobby-card{
  width:min(440px,90vw);
  background:linear-gradient(145deg, rgba(18,22,15,0.95), rgba(10,13,10,0.9));
  border:1px solid var(--panel-border);
  padding:36px 32px 28px;
  position:relative;

  box-shadow:
    0 25px 70px rgba(0,0,0,0.65),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

.lobby-card::before{
  content:"";
  position:absolute;
  left:0;
  right:0;
  top:0;
  height:3px;
  background:linear-gradient(90deg,var(--blood),var(--acid));
}

/* ---------- TEXT ---------- */

.display{
  font-family:'Oswald',sans-serif;
  text-transform:uppercase;
  letter-spacing:0.04em;
}

h1.title{
  font-family:'Oswald',sans-serif;
  font-size:44px;
  margin:0 0 6px;
  line-height:0.95;
  text-shadow:0 0 18px rgba(159,239,0,0.25);
}

h1.title span{
  color:var(--acid);
}

/* ---------- INPUTS ---------- */

input#nameInput,
input#roomInput{
  width:100%;
  background:#090b07;
  border:1px solid var(--panel-border);
  color:var(--bone);
  font-size:15px;
  padding:12px 14px;
  outline:none;
  margin-bottom:14px;
}

input:focus{
  border-color:var(--acid);
  box-shadow:0 0 12px rgba(159,239,0,0.2);
}

/* ---------- BUTTON ---------- */

button#joinBtn{
  width:100%;
  padding:13px;
  border:none;
  cursor:pointer;

  background:var(--acid);
  color:#0a0d0a;

  font-family:'Oswald',sans-serif;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;

  transition:0.15s ease;
}

button#joinBtn:hover{
  filter:brightness(1.1);
  transform:translateY(-1px);
}

button#joinBtn:active{
  transform:translateY(0px);
}

/* ---------- HUD ---------- */

.stat-block{
  background:rgba(10,13,10,0.7);
  border:1px solid var(--panel-border);
  padding:8px 14px;
}

.wave-label{
  font-family:'Oswald',sans-serif;
  color:var(--acid);
}

.room-label b{
  color:var(--bone);
}

/* ---------- HEALTH ---------- */

#healthBar .fill{
  background:linear-gradient(90deg,var(--blood),var(--acid));
}

/* ---------- FEED ---------- */

.feed-item{
  background:rgba(10,13,10,0.7);
  border-left:3px solid var(--acid);
  padding:5px 10px;
}

/* ---------- CHAT ---------- */

#chatLog{
  background:rgba(10,13,10,0.7);
  border:1px solid var(--panel-border);
}

/* ---------- CENTER MSG ---------- */

.center-msg .big{
  color:var(--acid);
  text-shadow:0 0 18px rgba(159,239,0,0.3);
}

.center-msg .big.danger{
  color:var(--blood);
}

/* ---------- DAMAGE ---------- */

#damageVignette{
  position:absolute;
  inset:0;
  pointer-events:none;
}

</style>
</head>

<body>

<!-- ORIGINAL HTML UNTOUCHED -->
<div id="lobby">
  <div class="lobby-card">
    <div class="eyebrow">Signal lost — outskirts sector</div>
    <h1 class="title">OUT<span>BREAK</span></h1>
    <div class="sub">Online co-op wave survival. Team up, hold the line, don't run out of lives.</div>

    <div class="field-label">Callsign</div>
    <input id="nameInput" maxlength="14" placeholder="Your name" />

    <div class="field-label">Room code (optional)</div>
    <input id="roomInput" maxlength="8" placeholder="Leave blank to start a new match" />

    <button id="joinBtn">Drop In</button>
    <div id="connStatus"></div>
  </div>
</div>

<div id="gameWrap">
  <div id="canvasFrame">
    <canvas id="game" width="1600" height="900"></canvas>
    <div id="hud"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/client.js"></script>

</body>
</html>
